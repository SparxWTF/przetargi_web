<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#020204"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" stroke="#39FF14" stroke-width="1.5" opacity="0.3"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="18" stroke="#39FF14" stroke-width="1" opacity="0.25"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="10" stroke="#39FF14" stroke-width="1" opacity="0.2"/>
  <!-- Crosshairs -->
  <line x1="32" y1="4" x2="32" y2="60" stroke="#39FF14" stroke-width="0.5" opacity="0.15"/>
  <line x1="4" y1="32" x2="60" y2="32" stroke="#39FF14" stroke-width="0.5" opacity="0.15"/>
  <!-- Sweep beam -->
  <line x1="32" y1="32" x2="54" y2="14" stroke="#39FF14" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
  </line>
  <!-- Sweep glow trail -->
  <path d="M32,32 L54,14 A26,26 0 0,0 32,6 Z" fill="#39FF14" opacity="0.08"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#39FF14" opacity="0.7"/>
  <circle cx="32" cy="32" r="5" stroke="#39FF14" stroke-width="0.8" opacity="0.3">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Blips -->
  <circle cx="42" cy="20" r="2" fill="#39FF14" opacity="0.6"/>
  <circle cx="22" cy="40" r="1.5" fill="#39FF14" opacity="0.3"/>
</svg>
